<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

            <link
                    rel="stylesheet"
                    type="text/css"
                    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
            />
            <link
                    rel="stylesheet"
                    type="text/css"
                    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
            />

		<!-- Theme initialization - runs before page render to prevent FOUC -->
		<script>
			(function() {
				try {
					// Check localStorage for saved theme preference
					const savedTheme = localStorage.getItem('theme');

					// Determine which theme to apply
					let theme;
					if (savedTheme === 'light' || savedTheme === 'dark') {
						theme = savedTheme;
					} else {
						// Default to system preference
						theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}

					// Apply theme immediately
					if (theme === 'dark') {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.remove('dark');
					}
				} catch (e) {
					// If localStorage is not available, default to light mode
					console.error('Failed to initialize theme:', e);
				}
			})();
		</script>

		<!-- Loading screen styles -->
		<style>
			#app-loading {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background-color: #ffffff;
				z-index: 9999;
				transition: opacity 0.3s ease-out;
				pointer-events: all; /* Block all interactions */
			}

			.dark #app-loading {
				background-color: #0f172a;
			}

			#app-loading.fade-out {
				opacity: 0;
				pointer-events: none;
			}

			/* Prevent interaction with body until app is ready */
			body.loading {
				overflow: hidden;
				pointer-events: none;
			}

			body.loading #app-loading {
				pointer-events: all;
			}

			.app-icon {
				width: 80px;
				height: 80px;
				animation: pulse 1.5s ease-in-out infinite;
			}

			.loading-text {
				margin-top: 24px;
				font-size: 16px;
				font-weight: 600;
				color: #64748b;
				letter-spacing: 0.025em;
			}

			.dark .loading-text {
				color: #94a3b8;
			}

			.loading-dots {
				display: inline-block;
				animation: dots 1.5s steps(4, end) infinite;
			}

			@keyframes pulse {
				0%, 100% {
					transform: scale(1);
					opacity: 1;
				}
				50% {
					transform: scale(1.05);
					opacity: 0.8;
				}
			}

			@keyframes dots {
				0%, 20% {
					content: '';
				}
				40% {
					content: '.';
				}
				60% {
					content: '..';
				}
				80%, 100% {
					content: '...';
				}
			}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="loading">
		<!-- Loading screen -->
		<div id="app-loading">
			<!-- Inline SVG icon with animation -->
			<svg class="app-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
				<defs>
					<linearGradient id="walletGradient" x1="0%" y1="0%" x2="100%" y2="100%">
						<stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
						<stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
					</linearGradient>
				</defs>
				<circle cx="64" cy="64" r="60" fill="url(#walletGradient)" />
				<text x="64" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fff" text-anchor="middle">D</text>
				<text x="90" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fbbf24" text-anchor="middle">$</text>
			</svg>
			<p class="loading-text">Loading<span class="loading-dots"></span></p>
		</div>

		<div style="display: contents">%sveltekit.body%</div>

		<!-- Remove loading screen when app is ready -->
		<script>
			(function() {
				let isHydrated = false;
				let assetsLoaded = false;

				function tryRemoveLoader() {
					// Only remove loader when both hydration and assets are complete
					if (isHydrated && assetsLoaded) {
						const loader = document.getElementById('app-loading');
						if (loader) {
							// Remove loading class from body to enable interactions
							document.body.classList.remove('loading');

							loader.classList.add('fade-out');
							setTimeout(function() {
								loader.remove();
							}, 300);
						}
					}
				}

				// Wait for window load (all assets including images, CSS, JS)
				window.addEventListener('load', function() {
					assetsLoaded = true;
					tryRemoveLoader();
				});

				// Wait for SvelteKit hydration
				document.addEventListener('DOMContentLoaded', function() {
					// Give SvelteKit a moment to hydrate
					setTimeout(function() {
						isHydrated = true;
						tryRemoveLoader();
					}, 100);
				});

				// Fallback: remove after 10 seconds if something goes wrong
				setTimeout(function() {
					const loader = document.getElementById('app-loading');
					if (loader && loader.parentNode) {
						console.warn('Loading took longer than expected, removing loader');
						document.body.classList.remove('loading');
						loader.classList.add('fade-out');
						setTimeout(function() {
							if (loader.parentNode) {
								loader.remove();
							}
						}, 300);
					}
				}, 10000);
			})();
		</script>
	</body>
</html>
